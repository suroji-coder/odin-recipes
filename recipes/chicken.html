<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Curry</title>
</head>
<body>
    <h1>Chicken Curry</h1>
    <img src="/images/Andhra-Chicken-Curry-2-1.jpg" alt="chicken curry" height="300" width="400">
    <h2>Description</h2>
    <p>This is simple Chicken curry recipe.It is  easy  to cook and perfect for beginner</p>
    <h2>Ingredients</h2>
    <ul>
        <li>Chicken</li>
        <li>Onion</li>
        <li>Tomato</li>
        <li>Spices</li>
    </ul>
    <h2>Steps</h2>
    <ol>
        <li>Cut the chicken into pieces</li>
        <li>Heat oil and fry onion</li>
        <li>Add tomato and Spices</li>
        <li>Add chicken and cook for 20 min</li>
    </ol>
    
</body>
